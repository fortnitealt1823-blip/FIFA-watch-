<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA watch numbers</title>
    <style>
        :root {
            --pitch-green: #0d1f10;
            --neon-green: #2ed573;
            --gold: #ffa502;
            --dark-card: #162a19;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a3a20 0%, var(--pitch-green) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .stadium-card {
            width: 100%;
            max-width: 400px;
            background: var(--dark-card);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stadium-card h2 {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 16px;
            box-sizing: border-box;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(46, 213, 115, 0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--neon-green);
            color: #000000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 30px;
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .number-slot {
            background: #000000;
            color: var(--gold);
            font-family: monospace, sans-serif;
            font-size: 48px;
            font-weight: bold;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 14px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            display: inline-block;
        }

        .settled {
            animation: lockIn 0.3s ease-out;
            color: #ffffff;
            border-color: rgba(255,255,255,0.2);
        }

        @keyframes lockIn {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="stadium-card">
    <h2>FIFA watch numbers</h2>
    
    <div class="input-group">
        <label for="userName">Name</label>
        <input type="text" id="userName" placeholder="Enter name..." autocomplete="off">
    </div>
    
    <button id="submitBtn">Draw Numbers</button>
    
    <div id="result"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDutMXqnO9eJb8Dz0x1sSEvtiScc4PyAIk",
        authDomain: "fifawatch-2026.firebaseapp.com",
        projectId: "fifawatch-2026",
        storageBucket: "fifawatch-2026.firebasestorage.app",
        messagingSenderId: "711968683340",
        appId: "1:711968683340:web:d4f2226f7e910089c2cbe9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Place your Discord Webhook URL inside the quotation marks below
    const discordWebhookUrl = "https://discord.com/api/webhooks/1526746402527383745/2NzyQ4i6afw7fZpbZl9UFg3sloRP8sGqdfUAyT3NeG7QQvfuiHw8cehkXcp8Bakc4_J7";

    const submitBtn = document.getElementById('submitBtn');
    const userNameInput = document.getElementById('userName');
    const resultDiv = document.getElementById('result');

    submitBtn.addEventListener('click', async () => {
        const name = userNameInput.value.trim();

        if (!name) {
            alert('Please enter a player name.');
            return;
        }

        submitBtn.disabled = true;
        
        resultDiv.innerHTML = `
            Checking roster space...
            <div class="badge-container">
                <div class="number-slot" id="slot1">00</div>
                <div class="number-slot" id="slot2">00</div>
            </div>`;

        const slot1 = document.getElementById('slot1');
        const slot2 = document.getElementById('slot2');

        const rollInterval = setInterval(() => {
            slot1.innerText = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            slot2.innerText = Math.floor(Math.random() * 100).toString().padStart(2, '0');
        }, 70);

        try {
            const finalNumbers = await runTransaction(db, async (transaction) => {
                const snapshot = await getDocs(collection(db, "userSelections"));
                const takenNumbers = new Set();
                let nameExists = false;
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    if (data.name && data.name.toLowerCase() === name.toLowerCase()) {
                        nameExists = true;
                    }
                    
                    if (data.numbers && Array.isArray(data.numbers)) {
                        data.numbers.forEach(num => takenNumbers.add(num));
                    }
                });

                if (nameExists) {
                    throw new Error("NAME_TAKEN");
                }

                let availableNumbers = [];
                for (let i = 0; i < 100; i++) {
                    const formatted = i.toString().padStart(2, '0');
                    if (!takenNumbers.has(formatted)) {
                        availableNumbers.push(formatted);
                    }
                }

                if (availableNumbers.length < 2) {
                    throw new Error("NOT_ENOUGH_NUMBERS");
                }

                availableNumbers.sort(() => Math.random() - 0.5);
                const selected = [availableNumbers[0], availableNumbers[1]];

                const selectionDocRef = doc(collection(db, "userSelections"));
                transaction.set(selectionDocRef, {
                    name: name,
                    numbers: selected,
                    timestamp: serverTimestamp()
                });

                return selected;
            });

            // If a webhook URL is configured, generate a single combined list of all entries
            if (discordWebhookUrl !== "YOUR_DISCORD_WEBHOOK_URL") {
                // Fetch updated collection list directly to include the fresh entry
                const updatedSnapshot = await getDocs(collection(db, "userSelections"));
                let combinedRows = "";

                updatedSnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.name && data.numbers) {
                        const paddedName = data.name.padEnd(20, ' ');
                        const numbersDisplay = `${data.numbers[0]} & ${data.numbers[1]}`;
                        combinedRows += `| ${paddedName} | ${numbersDisplay.padEnd(9, ' ')} |\n`;
                    }
                });

                const combinedMessage = 
`⚽ **Current Squad Roster Update**
\`\`\`
+----------------------+-----------+
| Player Name          | Numbers   |
+----------------------+-----------+
${combinedRows}+----------------------+-----------+
\`\`\``;

                await fetch(discordWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: combinedMessage })
                });
            }

            clearInterval(rollInterval);
            
            resultDiv.innerHTML = `
                Welcome to the roster, <strong>${name}</strong>!<br>Your assigned numbers are:
                <div class="badge-container">
                    <div class="number-slot settled">${finalNumbers[0]}</div>
                    <div class="number-slot settled">${finalNumbers[1]}</div>
                </div>`;
                
            userNameInput.value = '';

        } catch (error) {
            clearInterval(rollInterval);
            console.error(error);
            if (error.message === "NAME_TAKEN") {
                resultDiv.innerHTML = `<span style='color: #ffa502;'>  "${name}" has already drawn numbers. You cannot enter twice. If you bought 2 tickets then put your name with a 2 next to it:)</span>`;
            } else if (error.message === "NOT_ENOUGH_NUMBERS") {
                resultDiv.innerHTML = "<span style='color: #ffa502;'>Draft closed. All squad numbers are claimed.</span>";
            } else {
                resultDiv.innerText = "Error completing draft selection. Please try again.";
            }
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
