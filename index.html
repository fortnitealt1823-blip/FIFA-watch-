<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA watch numbers</title>
    <style>
        :root {
            --pitch-green: #0d1f10;
            --neon-green: #2ed573;
            --gold: #ffa502;
            --dark-card: #162a19;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a3a20 0%, var(--pitch-green) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .stadium-card {
            width: 100%;
            max-width: 400px;
            background: var(--dark-card);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stadium-card h2 {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 16px;
            box-sizing: border-box;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(46, 213, 115, 0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--neon-green);
            color: #000000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 30px;
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        /* Slot Machine Structure Container */
        .number-slot {
            background: #000000;
            width: 80px;
            height: 80px;
            border-radius: 14px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.9), 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            position: relative;
            display: inline-block;
        }

        /* The moving strip containing 00-99 */
        .slot-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 2.5s cubic-bezier(0.1, 0.8, 0.1, 1);
            transform: translateY(0);
        }

        /* Individual number frame inside the strip */
        .slot-number {
            color: var(--gold);
            font-family: monospace, sans-serif;
            font-size: 48px;
            font-weight: bold;
            width: 80px;
            height: 80px;
            line-height: 80px;
            text-align: center;
            box-sizing: border-box;
        }

        .settled .slot-number {
            color: #ffffff;
            animation: lockIn 0.3s ease-out;
        }

        @keyframes lockIn {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="stadium-card">
    <h2>FIFA watch numbers</h2>
    
    <div class="input-group">
        <label for="userName">Name</label>
        <input type="text" id="userName" placeholder="Enter name..." autocomplete="off">
    </div>
    
    <button id="submitBtn">Draw Numbers</button>
    
    <div id="result"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDutMXqnO9eJb8Dz0x1sSEvtiScc4PyAIk",
        authDomain: "fifawatch-2026.firebaseapp.com",
        projectId: "fifawatch-2026",
        storageBucket: "fifawatch-2026.firebasestorage.app",
        messagingSenderId: "711968683340",
        appId: "1:711968683340:web:d4f2226f7e910089c2cbe9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const discordWebhookUrl = "https://discord.com/api/webhooks/1526746402527383745/2NzyQ4i6afw7fZpbZl9UFg3sloRP8sGqdfUAyT3NeG7QQvfuiHw8cehkXcp8Bakc4_J7";

    const submitBtn = document.getElementById('submitBtn');
    const userNameInput = document.getElementById('userName');
    const resultDiv = document.getElementById('result');

    // Generate standard HTML template layout for the slot lists (00 to 99)
    function generateSlotHTML(id) {
        let numbersHTML = '';
        for (let i = 0; i < 100; i++) {
            numbersHTML += `<div class="slot-number">${i.toString().padStart(2, '0')}</div>`;
        }
        return `
            <div class="number-slot" id="${id}">
                <div class="slot-strip" id="${id}-strip">
                    ${numbersHTML}
                </div>
            </div>`;
    }

    submitBtn.addEventListener('click', async () => {
        const name = userNameInput.value.replace(/[|`*]/g, '').trim();

        if (!name) {
            alert('Please enter a player name.');
            return;
        }

        submitBtn.disabled = true;
        
        // Render the visual slot containers instantly
        resultDiv.innerHTML = `
            Drafting your squad numbers...
            <div class="badge-container">
                ${generateSlotHTML('slot1')}
                ${generateSlotHTML('slot2')}
            </div>`;

        const strip1 = document.getElementById('slot1-strip');
        const strip2 = document.getElementById('slot2-strip');

        // Spin instantly to create a rolling illusion while querying database
        setTimeout(() => {
            if (strip1 && strip2) {
                strip1.style.transition = 'transform 0.5s linear';
                strip2.style.transition = 'transform 0.5s linear';
                strip1.style.transform = `translateY(-7200px)`; // Fast initial spin loop
                strip2.style.transform = `translateY(-6400px)`;
            }
        }, 20);

        try {
            const snapshot = await getDocs(collection(db, "userSelections"));
            const takenNumbers = new Set();
            let nameExists = false;
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.name && data.name.toLowerCase() === name.toLowerCase()) {
                    nameExists = true;
                }
                if (data.numbers && Array.isArray(data.numbers)) {
                    data.numbers.forEach(num => takenNumbers.add(num.toString().padStart(2, '0')));
                }
            });

            if (nameExists) {
                throw new Error("NAME_TAKEN");
            }

            let availableNumbers = [];
            for (let i = 0; i < 100; i++) {
                const formatted = i.toString().padStart(2, '0');
                if (!takenNumbers.has(formatted)) {
                    availableNumbers.push(formatted);
                }
            }

            if (availableNumbers.length < 2) {
                throw new Error("NOT_ENOUGH_NUMBERS");
            }

            // Fisher-Yates shuffle
            for (let i = availableNumbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableNumbers[i], availableNumbers[j]] = [availableNumbers[j], availableNumbers[i]];
            }
            const selected = [availableNumbers[0], availableNumbers[1]];

            await runTransaction(db, async (transaction) => {
                const selectionDocRef = doc(collection(db, "userSelections"));
                transaction.set(selectionDocRef, {
                    name: name,
                    numbers: selected,
                    timestamp: serverTimestamp()
                });
            });

            // Calculate precise vertical offset positions for the picked numbers
            const val1 = parseInt(selected[0], 10);
            const val2 = parseInt(selected[1], 10);
            
            const offset1 = -(val1 * 80);
            const offset2 = -(val2 * 80);

            if (strip1 && strip2) {
                // Apply easing equations to simulate natural casino gears clicking to a halt
                strip1.style.transition = 'transform 2.5s cubic-bezier(0.1, 0.8, 0.1, 1)';
                strip2.style.transition = 'transform 3.0s cubic-bezier(0.1, 0.8, 0.1, 1)';
                
                strip1.style.transform = `translateY(${offset1}px)`;
                strip2.style.transform = `translateY(${offset2}px)`;
            }

            // Wait for visual animations to conclude gracefully before displaying message updates
            setTimeout(() => {
                document.getElementById('slot1')?.classList.add('settled');
                document.getElementById('slot2')?.classList.add('settled');
                
                const welcomeMsg = document.createElement('div');
                welcomeMsg.style.marginTop = '20px';
                welcomeMsg.innerHTML = `Welcome to the roster, <strong>${name}</strong>! Your numbers are officially locked.`;
                resultDiv.appendChild(welcomeMsg);
                
                userNameInput.value = '';
            }, 3100);

            // Decoupled Discord Webhook Routine
            if (discordWebhookUrl && discordWebhookUrl.startsWith("https://discord.com")) {
                try {
                    const updatedSnapshot = await getDocs(collection(db, "userSelections"));
                    let combinedRows = "";

                    updatedSnapshot.forEach((doc) => {
                        const data = doc.data();
                        if (data.name && data.numbers) {
                            const paddedName = data.name.substring(0, 20).padEnd(20, ' ');
                            const numbersDisplay = `${data.numbers[0]} & ${data.numbers[1]}`;
                            combinedRows += `| ${paddedName} | ${numbersDisplay.padEnd(9, ' ')} |\n`;
                        }
                    });

                    const combinedMessage = 
`⚽ **Current Squad Roster Update**
\`\`\`
+----------------------+-----------+
| Player Name          | Numbers   |
+----------------------+-----------+
${combinedRows}+----------------------+-----------+
\`\`\``;

                    await fetch(discordWebhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: combinedMessage })
                    });
                } catch (webhookError) {
                    console.error("Discord integration update skipped or rate-limited:", webhookError);
                }
            }

        } catch (error) {
            // Reset transforms if system database issues arise
            if (strip1 && strip2) {
                strip1.style.transition = 'none';
                strip2.style.transition = 'none';
                strip1.style.transform = 'translateY(0)';
                strip2.style.transform = 'translateY(0)';
            }
            
            console.error("Draft error details:", error);
            if (error.message === "NAME_TAKEN") {
                resultDiv.innerHTML = `<span style='color: #ffa502;'> "${name}" has already drawn numbers. You cannot enter twice. If you bought 2 tickets then put your name with a 2 next to it:)</span>`;
            } else if (error.message === "NOT_ENOUGH_NUMBERS") {
                resultDiv.innerHTML = "<span style='color: #ffa502;'>Draft closed. All squad numbers are claimed.</span>";
            } else {
                resultDiv.innerText = "Error completing draft selection due to network connectivity. Please try again.";
            }
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
