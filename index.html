<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Watch Numbers</title>
    <style>
        :root {
            --pitch-dark: #050f06;
            --pitch-green: #0a1f0d;
            --neon-green: #00ff66;
            --gold: #ffd700;
            --glass-bg: rgba(10, 26, 13, 0.8);
            --border-glow: rgba(0, 255, 102, 0.25);
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: 
                radial-gradient(circle at 50% 0%, rgba(0, 255, 102, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(0, 0, 0, 0.8) 0%, var(--pitch-dark) 100%),
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            background-color: var(--pitch-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .stadium-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 35px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0, 255, 102, 0.08);
            text-align: center;
            border: 1px solid var(--border-glow);
            position: relative;
        }

        .stadium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-green), var(--gold), var(--neon-green), transparent);
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        .brand-badge {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--neon-green);
            margin-bottom: 12px;
            display: inline-block;
            opacity: 0.9;
        }

        .stadium-card h2 {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0;
            margin-bottom: 40px;
            background: linear-gradient(180deg, #ffffff 0%, #dcdcdc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 35px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 2px;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 20px 24px;
            box-sizing: border-box;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.25);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--neon-green) 0%, #00cc52 100%);
            color: #020803;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0, 255, 102, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 255, 102, 0.45);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        #result {
            margin-top: 40px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 25px;
        }

        .number-slot {
            background: linear-gradient(180deg, #0d1a10 0%, #000000 100%);
            color: var(--gold);
            font-family: 'Courier New', Courier, monospace;
            font-size: 58px;
            font-weight: 900;
            width: 105px;
            height: 105px;
            line-height: 105px;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.6), inset 0 2px 6px rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: inline-block;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.25);
        }

        .settled {
            animation: lockIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #ffffff;
            background: linear-gradient(180deg, #16361d 0%, #051208 100%);
            border-color: var(--neon-green);
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.5);
            box-shadow: 0 12px 24px rgba(0,0,0,0.6), 0 0 20px rgba(0, 255, 102, 0.2);
        }

        @keyframes lockIn {
            0% { transform: scale(0.75) rotate(-8deg); opacity: 0.4; }
            70% { transform: scale(1.15) rotate(4deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .status-message {
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 13px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="stadium-card">
    <div class="brand-badge">FIFA Watch 2026</div>
    <h2>FIFA WATch numbers</h2>
    
    <div class="input-group">
        <label for="userName">Player Name</label>
        <input type="text" id="userName" placeholder="Enter full name..." autocomplete="off">
    </div>
    
    <button id="submitBtn">Draw Numbers</button>
    
    <div id="result"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDutMXqnO9eJb8Dz0x1sSEvtiScc4PyAIk",
        authDomain: "fifawatch-2026.firebaseapp.com",
        projectId: "fifawatch-2026",
        storageBucket: "fifawatch-2026.firebasestorage.app",
        messagingSenderId: "711968683340",
        appId: "1:711968683340:web:d4f2226f7e910089c2cbe9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const discordWebhookUrl = "https://discord.com/api/webhooks/1526746402527383745/2NzyQ4i6afw7fZpbZl9UFg3sloRP8sGqdfUAyT3NeG7QQvfuiHw8cehkXcp8Bakc4_J7";

    const submitBtn = document.getElementById('submitBtn');
    const userNameInput = document.getElementById('userName');
    const resultDiv = document.getElementById('result');

    submitBtn.addEventListener('click', async () => {
        const name = userNameInput.value.trim();

        if (!name) {
            alert('Please enter a player name.');
            return;
        }

        submitBtn.disabled = true;
        
        resultDiv.innerHTML = `
            <div class="status-message">Checking roster availability...</div>
            <div class="badge-container">
                <div class="number-slot" id="slot1">00</div>
                <div class="number-slot" id="slot2">00</div>
            </div>`;

        const slot1 = document.getElementById('slot1');
        const slot2 = document.getElementById('slot2');

        const rollInterval = setInterval(() => {
            slot1.innerText = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            slot2.innerText = Math.floor(Math.random() * 100).toString().padStart(2, '0');
        }, 70);

        try {
            const finalNumbers = await runTransaction(db, async (transaction) => {
                const snapshot = await getDocs(collection(db, "userSelections"));
                const takenNumbers = new Set();
                let nameExists = false;
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    if (data.name && data.name.toLowerCase() === name.toLowerCase()) {
                        nameExists = true;
                    }
                    
                    if (data.numbers && Array.isArray(data.numbers)) {
                        data.numbers.forEach(num => takenNumbers.add(num));
                    }
                });

                if (nameExists) {
                    throw new Error("NAME_TAKEN");
                }

                let availableNumbers = [];
                for (let i = 0; i < 100; i++) {
                    const formatted = i.toString().padStart(2, '0');
                    if (!takenNumbers.has(formatted)) {
                        availableNumbers.push(formatted);
                    }
                }

                if (availableNumbers.length < 2) {
                    throw new Error("NOT_ENOUGH_NUMBERS");
                }

                availableNumbers.sort(() => Math.random() - 0.5);
                const selected = [availableNumbers[0], availableNumbers[1]];

                const selectionDocRef = doc(collection(db, "userSelections"));
                transaction.set(selectionDocRef, {
                    name: name,
                    numbers: selected,
                    timestamp: serverTimestamp()
                });

                return selected;
            });

            if (discordWebhookUrl !== "YOUR_DISCORD_WEBHOOK_URL") {
                const updatedSnapshot = await getDocs(collection(db, "userSelections"));
                
                // Store entries into an array so we can sort them alphabetically
                let rosterList = [];
                updatedSnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.name && data.numbers) {
                        rosterList.push({
                            name: data.name,
                            numbers: data.numbers
                        });
                    }
                });

                // Sort the list alphabetically by player name (case-insensitive)
                rosterList.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));

                let combinedRows = "";
                rosterList.forEach((player) => {
                    const paddedName = player.name.padEnd(20, ' ');
                    const numbersDisplay = `${player.numbers[0]} & ${player.numbers[1]}`;
                    combinedRows += `| ${paddedName} | ${numbersDisplay.padEnd(9, ' ')} |\n`;
                });

                const combinedMessage = 
`⚽ **Current Squad Roster Update**
\`\`\`
+----------------------+-----------+
| Player Name          | Numbers   |
+----------------------+-----------+
${combinedRows}+----------------------+-----------+
\`\`\``;

                await fetch(discordWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: combinedMessage })
                });
            }

            clearInterval(rollInterval);
            
            resultDiv.innerHTML = `
                <div class="status-message" style="color: var(--neon-green); font-weight: 900; margin-bottom: 8px;">Welcome to the list</div>
                <strong style="font-size: 18px; color: #ffffff;">${name}</strong><br>
                <span style="font-size: 14px; color: var(--text-muted);">Your numbers are officially locked in remember to take a picture 😊.</span>
                <div class="badge-container">
                    <div class="number-slot settled">${finalNumbers[0]}</div>
                    <div class="number-slot settled">${finalNumbers[1]}</div>
                </div>`;
                
            userNameInput.value = '';

        } catch (error) {
            clearInterval(rollInterval);
            console.error(error);
            if (error.message === "NAME_TAKEN") {
                resultDiv.innerHTML = `<span style='color: var(--gold); font-weight: 700; display: inline-block; padding: 10px; border-radius: 8px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.2);'>"${name}" has already drawn numbers. You cannot enter twice. If you bought 2 tickets, add a "2" next to your name!</span>`;
            } else if (error.message === "NOT_ENOUGH_NUMBERS") {
                resultDiv.innerHTML = "<span style='color: var(--gold); font-weight: 700;'>Draft closed. All squad numbers are claimed.</span>";
            } else {
                resultDiv.innerHTML = "<span style='color: #ff4d4d; font-weight: 700;'>Error completing draft selection. Please try again.</span>";
            }
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
